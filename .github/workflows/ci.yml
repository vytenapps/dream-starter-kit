name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Leverage Vercel Remote Caching with Turbo to speed up builds.
# @link https://turborepo.com/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Lint
        run: pnpm lint && pnpm lint:ws

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Format
        run: pnpm format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Unit tests (vitest)
        run: pnpm test

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      # Fails only on strong copyleft (GPL/AGPL/SSPL) with no permissive option.
      - name: License check
        run: pnpm license:check

  # Integration: a real local Supabase stack (Postgres + Auth + Storage), the
  # RLS isolation regression, and the Playwright critical-path e2e against the
  # web app. This is the security + end-to-end gate.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations + seed)
        run: supabase start

      # `supabase status -o env` prints the LOCAL stack's well-known demo anon +
      # service_role keys to stdout — throwaway values for an ephemeral CI
      # Postgres, not real secrets. They're written to a private .env consumed by
      # `next dev` and the RLS tests (both via `dotenv -e ../../.env`); never echoed.
      - name: Configure .env from local Supabase
        shell: bash
        run: |
          set -a
          source <(supabase status -o env)
          set +a
          : "${DB_URL:=postgresql://postgres:postgres@127.0.0.1:54322/postgres}"
          cat > .env <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          SUPABASE_DB_URL=$DB_URL
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          EXPO_PUBLIC_SUPABASE_URL=$API_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          EXPO_PUBLIC_API_URL=http://localhost:3000
          PAYLOAD_DATABASE_URL=postgresql://payload_cms:payload_local_dev_only@127.0.0.1:54322/postgres?options=-c%20search_path%3Dcms
          PAYLOAD_SECRET=ci-not-a-real-secret-change-me
          NEXT_PUBLIC_CMS_URL=http://localhost:3000
          S3_ENDPOINT=$API_URL/storage/v1/s3
          S3_REGION=local
          S3_ACCESS_KEY_ID=stub
          S3_SECRET_ACCESS_KEY=$ANON_KEY
          S3_BUCKET=cms-media
          EOF

      # Payload owns a separate `cms` Postgres schema + a least-privilege role.
      # `schema_paths` provisions it on `db reset`; CI uses `start`, so apply the
      # bootstrap explicitly (idempotent) as the postgres superuser.
      - name: Provision Payload CMS schema + role
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -f supabase/payload/00_cms_role.sql

      - name: RLS isolation regression
        run: pnpm test:rls

      # NOTE: the CMS is intentionally NOT pre-seeded here. Payload's dev push
      # (NODE_ENV!=production) creates the cms tables on boot, and the Playwright
      # `setup` project (founder.setup.ts) seeds demo content by signing up the
      # FIRST user — exercising the real signup→/cms-setup→seed path end-to-end —
      # so the public-content specs have data to render. Pre-seeding would mask
      # that path (the seed endpoint would no-op as already-seeded).
      - name: Install Playwright browser
        run: pnpm --filter @acme/web-e2e exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tooling/web-e2e/playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
